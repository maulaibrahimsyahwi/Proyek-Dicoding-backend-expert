name: Continuous Integration

on:
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: maula2004
          POSTGRES_DB: forumapi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - name: Install dependencies
        run: npm install
      - name: Run migrations
        run: npm run migrate:test
        env:
          PGHOST: localhost
          PGUSER: postgres
          PGDATABASE: forumapi_test
          PGPASSWORD: maula2004
          PGPORT: 5432
      - name: Run tests
        run: npm run test
