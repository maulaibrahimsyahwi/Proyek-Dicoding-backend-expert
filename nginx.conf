limit_req_zone $binary_remote_addr zone=forumapi:10m rate=90r/m;

server {
    server_name maula-forumapi.ddns.net;

    location /threads {
        limit_req zone=forumapi;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; 
    ssl_certificate /etc/letsencrypt/live/maula-forumapi.ddns.net/fullchain.pem; 
    ssl_certificate_key /etc/letsencrypt/live/maula-forumapi.ddns.net/privkey.pem; 
    include /etc/letsencrypt/options-ssl-nginx.conf; 
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; 
}

server {
    if ($host = maula-forumapi.ddns.net) {
        return 301 https://$host$request_uri;
    } 

    listen 80;
    server_name maula-forumapi.ddns.net;
    return 404; 
}